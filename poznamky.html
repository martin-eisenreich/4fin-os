<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<title>4fin | Poznámky</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --border:#252a3a;
    --accent:#c8a96e; --accent2:#e8c98e; --green:#4caf82; --red:#e05252;
    --blue:#5b8dee; --yellow:#e0a832; --text:#e8eaf0; --text2:#8892a4; --text3:#555f72; --r:12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px 12px; position:sticky; top:0; z-index:50; }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .logo { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:0.1em; text-transform:uppercase; }
  .header-date { font-size:11px; color:var(--text3); }
  .header-title { font-size:20px; font-weight:700; color:var(--text); }
  .sync-status { font-size:11px; display:flex; align-items:center; gap:6px; margin-top:4px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; }
  .sync-dot.ok { background:var(--green); }
  .sync-dot.syncing { background:var(--yellow); animation:pulse 1s infinite; }
  .sync-dot.err { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tabs { display:flex; gap:6px; padding:12px 20px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:500; border:1.5px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; transition:all 0.15s; }
  .tab.active { background:var(--accent); color:#0d0f14; border-color:var(--accent); font-weight:700; }

  .main { padding:0 16px 100px; }

  .person-tiles { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:4px 0; }
  .person-tile { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:16px 14px; cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
  .person-tile:active { border-color:var(--accent); transform:scale(0.97); }
  .person-tile-name { font-size:15px; font-weight:700; color:var(--text); margin-bottom:3px; }
  .person-tile-role { font-size:11px; color:var(--text3); margin-bottom:10px; }
  .person-tile-times { display:flex; flex-direction:column; gap:4px; }
  .person-tile-time { font-size:11px; color:var(--text2); display:flex; align-items:center; gap:5px; }
  .person-tile-count { position:absolute; top:10px; right:10px; min-width:20px; height:20px; border-radius:10px; background:var(--accent); color:#0d0f14; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 5px; }
  .person-tile-count.zero { background:var(--border); color:var(--text3); }
  .tile-actions { display:flex; gap:6px; margin-top:10px; }
  .tile-action { flex:1; padding:6px 4px; border-radius:7px; border:1px solid var(--border); background:var(--surface2); color:var(--text3); font-size:11px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.15s; }

  .note-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; }
  .note-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .note-person { font-size:13px; font-weight:700; color:var(--text); flex:1; }
  .note-type { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; letter-spacing:0.05em; flex-shrink:0; }
  .type-sys  { background:rgba(91,141,238,0.15); color:var(--blue);  border:1px solid rgba(91,141,238,0.3); }
  .type-rozv { background:rgba(76,175,130,0.15); color:var(--green); border:1px solid rgba(76,175,130,0.3); }
  .note-text { font-size:14px; color:var(--text); line-height:1.5; margin-bottom:8px; }
  .note-footer { display:flex; align-items:center; justify-content:space-between; }
  .note-date { font-size:11px; color:var(--text3); }
  .note-actions { display:flex; gap:8px; }
  .btn-icon { background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; padding:4px; }

  .section-head { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); padding:16px 0 8px; display:flex; align-items:center; gap:10px; }
  .section-head::after { content:''; flex:1; height:1px; background:var(--border); }

  .holiday-banner { background:rgba(224,168,50,0.1); border:1px solid rgba(224,168,50,0.3); border-radius:var(--r); padding:12px 14px; margin-bottom:10px; display:flex; align-items:flex-start; gap:10px; }
  .holiday-icon { font-size:18px; flex-shrink:0; }
  .holiday-text { font-size:13px; color:#f0d090; line-height:1.4; }

  .cons-row { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .cons-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .cons-dot.ok { background:var(--green); }
  .cons-dot.cancel { background:var(--red); }
  .cons-dot.moved { background:var(--yellow); }
  .cons-info { flex:1; }
  .cons-name { font-size:14px; font-weight:600; color:var(--text); }
  .cons-time { font-size:12px; color:var(--text3); margin-top:2px; }
  .cons-status { font-size:11px; font-weight:600; padding:4px 10px; border-radius:6px; cursor:pointer; border:none; }
  .cons-status.ok     { background:rgba(76,175,130,0.15); color:var(--green); }
  .cons-status.cancel { background:rgba(224,82,82,0.15);  color:var(--red); }
  .cons-status.moved  { background:rgba(224,168,50,0.15); color:var(--yellow); }

  .fab { position:fixed; bottom:24px; right:20px; width:58px; height:58px; border-radius:50%; background:var(--accent); color:#0d0f14; border:none; font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(200,169,110,0.4); z-index:100; transition:transform 0.15s; }
  .fab:active { transform:scale(0.93); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border-radius:20px 20px 0 0; padding:20px 20px 40px; width:100%; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); max-height:90vh; overflow-y:auto; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-size:18px; font-weight:700; color:var(--text); margin-bottom:6px; }
  .modal-subtitle { font-size:13px; color:var(--text3); margin-bottom:20px; }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:11px; font-weight:600; color:var(--text2); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
  .field textarea, .field select { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; padding:12px 14px; outline:none; transition:border-color 0.15s; -webkit-appearance:none; }
  .field textarea:focus, .field select:focus { border-color:var(--accent); }
  .field textarea { resize:none; min-height:100px; }

  /* AUTO-SAVE INDICATOR */
  .autosave-hint { font-size:11px; color:var(--text3); text-align:right; margin-top:4px; min-height:16px; transition:opacity 0.3s; }
  .autosave-hint.saved { color:var(--green); }

  .type-toggle { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .type-btn { padding:12px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text2); font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; text-align:center; }
  .type-btn.sel-sys  { border-color:var(--blue);  background:rgba(91,141,238,0.1);  color:var(--blue); }
  .type-btn.sel-rozv { border-color:var(--green); background:rgba(76,175,130,0.1); color:var(--green); }

  .btn-save { width:100%; background:var(--accent); color:#0d0f14; border:none; border-radius:12px; font-family:'Inter',sans-serif; font-size:16px; font-weight:700; padding:16px; cursor:pointer; margin-top:8px; }
  .btn-save:active { background:var(--accent2); }

  .empty { text-align:center; padding:40px 20px; color:var(--text3); }
  .empty-icon { font-size:40px; margin-bottom:12px; }

  .cancel-options { display:flex; flex-direction:column; gap:8px; }
  .cancel-opt { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; }
  .cancel-opt-title { font-size:14px; font-weight:600; color:var(--text); }
  .cancel-opt-desc { font-size:12px; color:var(--text3); margin-top:3px; }

  .person-grid-modal { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .person-btn-modal { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:12px; cursor:pointer; text-align:center; }
  .person-btn-modal.selected { border-color:var(--accent); background:rgba(200,169,110,0.1); }
  .person-btn-modal .pname { font-size:13px; font-weight:600; color:var(--text); }
  .person-btn-modal .prole { font-size:11px; color:var(--text3); margin-top:2px; }

  .loading { display:flex; align-items:center; gap:8px; color:var(--text3); font-size:12px; padding:8px 0; }
  .spinner-sm { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">4fin · Poznámky</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-title">Poznámkový blok</div>
  <div class="sync-status">
    <div class="sync-dot ok" id="syncDot"></div>
    <span id="syncText" style="color:var(--text3);">Připraveno</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('people', this)">👥 Lidé</div>
  <div class="tab" onclick="switchTab('all', this)">📋 Vše</div>
  <div class="tab" onclick="switchTab('sys', this)">📊 Systémová</div>
  <div class="tab" onclick="switchTab('rozv', this)">🌱 Rozvojová</div>
  <div class="tab" onclick="switchTab('calendar', this)">📅 Termíny</div>
</div>

<div class="main" id="main"></div>
<button class="fab" id="fab" onclick="openAddModal(null)" style="display:none">+</button>

<!-- MODAL: PŘIDAT POZNÁMKU -->
<div class="modal-overlay" id="addModal" onclick="closeOnOverlay(event,'addModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addModalTitle">Nová poznámka</div>
    <div class="modal-subtitle" id="addModalSub"></div>
    <div class="field" id="personFieldWrap">
      <label>Pro koho</label>
      <div class="person-grid-modal" id="personGridModal"></div>
    </div>
    <div class="field" id="typeToggleField">
      <label>Typ konzultace</label>
      <div class="type-toggle">
        <button class="type-btn" id="btnSys"  onclick="selectType('sys')">📊 Systémová</button>
        <button class="type-btn" id="btnRozv" onclick="selectType('rozv')" id="btnRozv">🌱 Rozvojová</button>
      </div>
    </div>
    <div class="field">
      <label>Co chceš otevřít</label>
      <textarea id="noteText" placeholder="Napiš téma, nápad, otázku..." rows="4" oninput="onNoteInput()"></textarea>
      <div class="autosave-hint" id="autosaveHint"></div>
    </div>
    <button class="btn-save" onclick="saveNote()">💾 Uložit poznámku</button>
  </div>
</div>

<!-- MODAL: ZRUŠENÍ KONZULTACE -->
<div class="modal-overlay" id="cancelModal" onclick="closeOnOverlay(event,'cancelModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="cancelModalTitle">Konzultace</div>
    <div class="cancel-options">
      <div class="cancel-opt" onclick="setCancelType('ok')"><div class="cancel-opt-title">✅ Konzultace proběhne</div><div class="cancel-opt-desc">Plánovaný termín platí</div></div>
      <div class="cancel-opt" onclick="setCancelType('cancel')"><div class="cancel-opt-title">❌ Konzultace odpadá</div><div class="cancel-opt-desc">Agenda se přesune na příští termín</div></div>
      <div class="cancel-opt" onclick="setCancelType('moved')"><div class="cancel-opt-title">📅 Přesunout na jiný termín</div><div class="cancel-opt-desc">Konzultace proběhne jindy</div></div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqnJsAlmzOAntypivM5oiLt8twpNJkJrUaK4D-rkvQPzFC_btwUrC8ivasYrnWbdsM6g/exec';

const PEOPLE = [
  { id:'kruts',       name:'Kruts',       full:'Kruts, Nataliia',   role:'Manažer',           sys:'Po 15:00', rozv:'Čt 15:00' },
  { id:'truhlar',     name:'Truhlář',     full:'Truhlář, Luboš',    role:'Oblastní ředitel',  sys:'Po 18:00', rozv:'Pá 9:00'  },
  { id:'bugaeva',     name:'Bugaeva',     full:'Bugaeva, Marina',   role:'TOP konzultant II', sys:'Po 16:00', rozv:'Čt 14:00' },
  { id:'honcharenko', name:'Honcharenko', full:'Honcharenko, Olha', role:'Manažer',           sys:'Út 12:00', rozv:'Pá 10:00' },
  { id:'zavrel',      name:'Zavřel',      full:'Zavřel, Radek',     role:'Senior konzultant', sys:'St 16:00', rozv:'TBD'      },
  { id:'moravcova',   name:'Moravcová',   full:'Moravcová, Tereza', role:'Konzultant',        sys:'Po 14:00', rozv:'TBD'      },
  { id:'ershova',     name:'Ershova',     full:'Ershova, Katka',    role:'Asistentka',        sys:'Po 9:00',  rozv:null, sysOnly:true },
];

const HOLIDAYS = [
  {date:'2026-07-05',name:'Den věrozvěstů'},{date:'2026-07-06',name:'Den Jana Husa'},
  {date:'2026-09-28',name:'Den české státnosti'},{date:'2026-10-28',name:'Vznik Československa'},
  {date:'2026-11-17',name:'Den svobody'},{date:'2026-12-24',name:'Štědrý den'},
  {date:'2026-12-25',name:'1. svátek vánoční'},{date:'2026-12-26',name:'2. svátek vánoční'},
];

const CONS_SCHEDULE = [
  {id:'moravcova-s', name:'Moravcová, Tereza',  type:'sys',  day:1, label:'Po 14:00'},
  {id:'kruts-s',     name:'Kruts, Nataliia',    type:'sys',  day:1, label:'Po 15:00'},
  {id:'bugaeva-s',   name:'Bugaeva, Marina',    type:'sys',  day:1, label:'Po 16:00'},
  {id:'truhlar-s',   name:'Truhlář, Luboš',     type:'sys',  day:1, label:'Po 18:00'},
  {id:'honch-s',     name:'Honcharenko, Olha',  type:'sys',  day:2, label:'Út 12:00'},
  {id:'zavrel-s',    name:'Zavřel, Radek',       type:'sys',  day:3, label:'St 16:00'},
  {id:'bugaeva-r',   name:'Bugaeva, Marina',    type:'rozv', day:4, label:'Čt 14:00'},
  {id:'kruts-r',     name:'Kruts, Nataliia',    type:'rozv', day:4, label:'Čt 15:00'},
  {id:'truhlar-r',   name:'Truhlář, Luboš',     type:'rozv', day:5, label:'Pá 9:00'},
  {id:'honch-r',     name:'Honcharenko, Olha',  type:'rozv', day:5, label:'Pá 10:00'},
];

let notes = [];
let cancelStatuses = {};
let selectedPerson = null;
let selectedType = null;
let cancelTarget = null;
let currentTab = 'people';
let autoSaveTimer = null;
let currentDraftKey = null;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 60000);
  buildPersonGridModal();
  loadFromLocal();
  render();
  syncFromSheets();
});

function updateClock() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('cs-CZ',{weekday:'short',day:'numeric',month:'numeric'});
}

// ── LOKÁLNÍ ÚLOŽIŠTĚ ──
function loadFromLocal() {
  try {
    notes = JSON.parse(localStorage.getItem('4fin_notes_v2') || '[]');
    cancelStatuses = JSON.parse(localStorage.getItem('4fin_cancel') || '{}');
  } catch(e) { notes = []; }
}

function saveToLocal() {
  localStorage.setItem('4fin_notes_v2', JSON.stringify(notes));
  localStorage.setItem('4fin_cancel', JSON.stringify(cancelStatuses));
}

// ── DRAFT (auto-save rozepsaného textu) ──
function getDraftKey(personId, type) {
  const pid = personId || selectedPerson || 'none';
  const t   = type    || selectedType   || 'none';
  return '4fin_draft_' + pid + '_' + t;
}

function saveDraft() {
  const text = document.getElementById('noteText').value;
  const key = getDraftKey();
  if (text.trim()) {
    localStorage.setItem(key, text);
    showAutosave('✓ Automaticky uloženo');
  } else {
    localStorage.removeItem(key);
  }
}

function loadDraft(personId, type) {
  const key = getDraftKey(personId, type);
  const draft = localStorage.getItem(key);
  const textarea = document.getElementById('noteText');
  if (draft) {
    textarea.value = draft;
    showAutosave('✓ Pokračuješ v rozepsané poznámce');
  } else {
    textarea.value = '';
    document.getElementById('autosaveHint').textContent = '';
  }
}

function clearDraft(personId, type) {
  const key = getDraftKey(personId, type);
  localStorage.removeItem(key);
}

function showAutosave(msg, cls='saved') {
  const el = document.getElementById('autosaveHint');
  el.textContent = msg;
  el.className = 'autosave-hint ' + cls;
}

function onNoteInput() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  showAutosave('Ukládám...', '');
  autoSaveTimer = setTimeout(() => { saveDraft(); }, 800);
}

// ── SYNC GOOGLE SHEETS ──
function setSyncStatus(status, text) {
  document.getElementById('syncDot').className = 'sync-dot ' + status;
  document.getElementById('syncText').textContent = text;
}

async function syncFromSheets() {
  setSyncStatus('syncing', 'Synchronizuji...');
  try {
    const resp = await fetch(SCRIPT_URL + '?action=load');
    const rows = await resp.json();
    // Poznámky jsou řádky s typem 'note'
    const sheetsNotes = rows.filter(r => r[2] === 'note' || r[2] === 'sys' || r[2] === 'rozv').map(r => ({
      id: r[0] ? String(r[0]) : Date.now().toString(),
      personId: r[1] || '',
      type: r[2] || 'sys',
      text: r[3] || '',
      created: r[4] ? Number(r[4]) : Date.now()
    })).filter(n => n.text && n.personId);
    if (sheetsNotes.length > 0) {
      // Merge — přidej nové ze Sheets které nemáme lokálně
      const localIds = new Set(notes.map(n=>n.id));
      sheetsNotes.forEach(n => { if (!localIds.has(n.id)) notes.unshift(n); });
      saveToLocal();
    }
    setSyncStatus('ok', 'Synchronizováno · ' + new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', 'Offline — data v lokální záloze');
  }
  render();
}

async function saveNoteToSheets(note) {
  setSyncStatus('syncing', 'Ukládám...');
  const row = [note.id, note.personId, note.type, note.text, note.created, 'note'];
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save', data: [row] })
    });
    setSyncStatus('ok', 'Uloženo · ' + new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', 'Uloženo lokálně');
  }
}

// ── RENDER ──
function render() {
  const main = document.getElementById('main');
  const fab = document.getElementById('fab');
  if (currentTab === 'people') { fab.style.display='none'; renderPeople(main); }
  else if (currentTab === 'calendar') { fab.style.display='none'; renderCalendar(main); }
  else { fab.style.display='flex'; renderNotes(main, currentTab); }
}

function renderPeople(main) {
  let html = '<div class="person-tiles">';
  PEOPLE.forEach(p => {
    const count = notes.filter(n => n.personId === p.id).length;
    html += `
    <div class="person-tile" onclick="openAddModal('${p.id}')">
      <div class="person-tile-count ${count===0?'zero':''}">${count}</div>
      <div class="person-tile-name">${p.name}</div>
      <div class="person-tile-role">${p.role}</div>
      <div class="person-tile-times">
        <div class="person-tile-time">📊 ${p.sys}</div>
        ${p.rozv && p.rozv!=='—'?`<div class="person-tile-time">🌱 ${p.rozv}</div>`:''}
      </div>
      <div class="tile-actions">
        <div class="tile-action" onclick="quickAdd(event,'${p.id}','sys')">+ Syst.</div>
        ${p.sysOnly ? '' : `<div class="tile-action" onclick="quickAdd(event,'${p.id}','rozv')">+ Rozv.</div>`}
      </div>
    </div>`;
  });
  html += '</div>';

  const recent = notes.slice(0,3);
  if (recent.length > 0) {
    html += `<div class="section-head">Poslední poznámky</div>`;
    recent.forEach(n => {
      const p = PEOPLE.find(x=>x.id===n.personId);
      const typeClass = n.type==='sys'?'type-sys':'type-rozv';
      const typeLabel = n.type==='sys'?'📊 Systémová':'🌱 Rozvojová';
      html += `<div class="note-card">
        <div class="note-header">
          <div class="note-person">${p?p.name:n.personId}</div>
          <div class="note-type ${typeClass}">${typeLabel}</div>
        </div>
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-footer">
          <div class="note-date">${new Date(n.created).toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          <button class="btn-icon" onclick="deleteNote('${n.id}')">🗑</button>
        </div>
      </div>`;
    });
    if (notes.length > 3) html += `<div style="text-align:center;padding:10px;font-size:13px;color:var(--text3);">+ ${notes.length-3} dalších</div>`;
  }
  main.innerHTML = html;
}

function renderNotes(main, filter) {
  let filtered = notes;
  if (filter==='sys')  filtered = notes.filter(n=>n.type==='sys');
  if (filter==='rozv') filtered = notes.filter(n=>n.type==='rozv');
  if (!filtered.length) { main.innerHTML=`<div class="empty"><div class="empty-icon">📝</div><div>Žádné poznámky.</div></div>`; return; }

  const byPerson = {};
  filtered.forEach(n=>{ if(!byPerson[n.personId]) byPerson[n.personId]=[]; byPerson[n.personId].push(n); });

  let html='';
  for (const [pid,pnotes] of Object.entries(byPerson)) {
    const p = PEOPLE.find(x=>x.id===pid);
    html += `<div class="section-head">${p?p.full:pid}</div>`;
    pnotes.sort((a,b)=>b.created-a.created).forEach(n => {
      const typeClass = n.type==='sys'?'type-sys':'type-rozv';
      const typeLabel = n.type==='sys'?'📊 Systémová':'🌱 Rozvojová';
      html += `<div class="note-card">
        <div class="note-header"><div class="note-person">${p?p.name:pid}</div><div class="note-type ${typeClass}">${typeLabel}</div></div>
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-footer">
          <div class="note-date">${new Date(n.created).toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          <div class="note-actions">
            <button class="btn-icon" onclick="toggleType('${n.id}')">🔄</button>
            <button class="btn-icon" onclick="deleteNote('${n.id}')">🗑</button>
          </div>
        </div>
      </div>`;
    });
  }
  main.innerHTML = html;
}

function renderCalendar(main) {
  const today = new Date();
  const upcoming = HOLIDAYS.filter(h=>{ const d=new Date(h.date); const diff=(d-today)/86400000; return diff>=0&&diff<=14; });
  const dayNames=['','Pondělí','Úterý','Středa','Čtvrtek','Pátek'];
  let html='';
  if (upcoming.length>0) {
    html+=`<div class="section-head">Blížící se svátky</div>`;
    upcoming.forEach(h=>{
      const d=new Date(h.date);
      html+=`<div class="holiday-banner"><div class="holiday-icon">🎉</div><div class="holiday-text"><strong>${h.name}</strong><br>${d.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'})}</div></div>`;
    });
  }
  html+=`<div class="section-head">Konzultace tento týden</div>`;
  const weekStart=new Date(today); weekStart.setDate(today.getDate()-today.getDay()+1);
  CONS_SCHEDULE.forEach(c=>{
    const consDate=new Date(weekStart); consDate.setDate(weekStart.getDate()+c.day-1);
    const consDateStr=consDate.toISOString().split('T')[0];
    const isHoliday=HOLIDAYS.find(h=>h.date===consDateStr);
    const status=cancelStatuses[c.id]||(isHoliday?'cancel':'ok');
    const typeLabel=c.type==='sys'?'📊 Systémová':'🌱 Rozvojová';
    const statusLabels={ok:'✅ Proběhne',cancel:'❌ Odpadá',moved:'📅 Přesunuto'};
    html+=`<div class="cons-row">
      <div class="cons-dot ${status}"></div>
      <div class="cons-info"><div class="cons-name">${c.name}</div><div class="cons-time">${dayNames[c.day]} · ${c.label} · ${typeLabel}</div>${isHoliday?`<div style="font-size:11px;color:var(--yellow);">⚠️ ${isHoliday.name}</div>`:''}</div>
      <button class="cons-status ${status}" onclick="openCancelModal('${c.id}','${c.name}')">${statusLabels[status]}</button>
    </div>`;
  });
  main.innerHTML=html;
}

function switchTab(tab, el) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── MODAL ──
function buildPersonGridModal() {
  const grid=document.getElementById('personGridModal');
  PEOPLE.forEach(p=>{
    const div=document.createElement('div');
    div.className='person-btn-modal'; div.dataset.id=p.id;
    div.innerHTML=`<div class="pname">${p.name}</div><div class="prole">${p.role}</div>`;
    div.onclick=()=>{
      document.querySelectorAll('.person-btn-modal').forEach(b=>b.classList.remove('selected'));
      div.classList.add('selected');
      selectedPerson=p.id;
      loadDraft(p.id, selectedType); // Načti draft pro tuto osobu + aktuální typ
    };
    grid.appendChild(div);
  });
}

function openAddModal(personId) {
  selectedPerson=personId||null;
  selectedType=null;
  document.getElementById('btnSys').className='type-btn';
  document.getElementById('btnRozv').className='type-btn';
  document.getElementById('autosaveHint').textContent='';
  // Skryj Rozvojovou pro Katku
  const p = PEOPLE.find(x=>x.id===personId);
  const btnRozv = document.getElementById('btnRozv');
  if (btnRozv) btnRozv.style.display = (p && p.sysOnly) ? 'none' : '';

  if (personId) {
    const p=PEOPLE.find(x=>x.id===personId);
    document.getElementById('addModalTitle').textContent=`Poznámka — ${p?p.name:personId}`;
    document.getElementById('addModalSub').textContent='';
    document.getElementById('personFieldWrap').style.display='none';
    // Načti draft pro tuto osobu + aktuální typ (nebo sys jako default)
    loadDraft(personId, selectedType||'sys');
  } else {
    document.getElementById('addModalTitle').textContent='Nová poznámka';
    document.getElementById('addModalSub').textContent='';
    document.getElementById('personFieldWrap').style.display='block';
    document.querySelectorAll('.person-btn-modal').forEach(b=>b.classList.remove('selected'));
    document.getElementById('noteText').value='';
    document.getElementById('autosaveHint').textContent='';
  }
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('noteText').focus(),400);
}

function quickAdd(e, personId, type) {
  e.stopPropagation();
  selectedPerson=personId;
  selectedType=type;
  const btnRozv = document.getElementById('btnRozv');
  const pp = PEOPLE.find(x=>x.id===personId);
  if (btnRozv) btnRozv.style.display = (pp && pp.sysOnly) ? 'none' : '';
  const p=PEOPLE.find(x=>x.id===personId);
  document.getElementById('addModalTitle').textContent=`Poznámka — ${p?p.name:personId}`;
  document.getElementById('addModalSub').textContent=type==='sys'?'📊 Systémová konzultace':'🌱 Rozvojová konzultace';
  document.getElementById('personFieldWrap').style.display='none';
  document.getElementById('btnSys').className='type-btn'+(type==='sys'?' sel-sys':'');
  document.getElementById('btnRozv').className='type-btn'+(type==='rozv'?' sel-rozv':'');
  document.getElementById('autosaveHint').textContent='';
  loadDraft();
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('noteText').focus(),400);
}

function selectType(t) {
  selectedType=t;
  document.getElementById('btnSys').className='type-btn'+(t==='sys'?' sel-sys':'');
  document.getElementById('btnRozv').className='type-btn'+(t==='rozv'?' sel-rozv':'');
  loadDraft(selectedPerson, t); // Načti draft pro správnou osobu + typ
}

async function saveNote() {
  const text=document.getElementById('noteText').value.trim();
  if (!selectedPerson) { alert('Vyber osobu!'); return; }
  if (!selectedType)   { alert('Vyber typ!'); return; }
  if (!text)           { alert('Napiš poznámku!'); return; }

  const note = { id:Date.now().toString(), personId:selectedPerson, type:selectedType, text, created:Date.now() };
  notes.unshift(note);
  saveToLocal();
  clearDraft(selectedPerson, selectedType); // Smaž draft po uložení
  document.getElementById('addModal').classList.remove('open');
  if (navigator.vibrate) navigator.vibrate(50);
  render();
  await saveNoteToSheets(note);
}

async function deleteNote(id) {
  if (!confirm('Smazat?')) return;
  notes=notes.filter(n=>n.id!==id);
  saveToLocal(); render();
}

function toggleType(id) {
  const n=notes.find(x=>x.id===id); if (!n) return;
  n.type=n.type==='sys'?'rozv':'sys';
  saveToLocal(); render();
}

function openCancelModal(id, name) {
  cancelTarget=id;
  document.getElementById('cancelModalTitle').textContent=name;
  document.getElementById('cancelModal').classList.add('open');
}

function setCancelType(type) {
  if (cancelTarget) { if(type==='ok') delete cancelStatuses[cancelTarget]; else cancelStatuses[cancelTarget]=type; saveToLocal(); }
  document.getElementById('cancelModal').classList.remove('open'); render();
}

function closeOnOverlay(e,id) { if(e.target.classList.contains('modal-overlay')) document.getElementById(id).classList.remove('open'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
</script>

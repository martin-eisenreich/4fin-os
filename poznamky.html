<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Poznámky">
<title>4fin | Poznámkový blok</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;
    --border:#252a3a;--accent:#c8a96e;--green:#4caf82;--red:#e05252;
    --yellow:#e0a832;--text:#e8eaf0;--text2:#8892a4;--text3:#555f72;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .back-btn{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:4px;}
  .back-btn:hover{color:var(--text);}
  .logo{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:0.08em;}
  #clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}
  .shell{max-width:520px;margin:0 auto;padding:20px 16px 100px;}
  .tabs{display:flex;gap:6px;margin-bottom:20px;}
  .tab-btn{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.15s;}
  .tab-btn.active{background:var(--accent);color:#0d0f14;border-color:var(--accent);}
  .quick-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
  .quick-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
  .quick-input:focus{border-color:var(--accent);}
  textarea.quick-input{resize:none;min-height:80px;}
  .add-btn{background:var(--accent);color:#0d0f14;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:10px;transition:opacity 0.15s;}
  .add-btn:hover{opacity:0.9;}
  .notes-list{display:flex;flex-direction:column;gap:10px;}
  .note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .note-card.priority{border-left:3px solid var(--accent);}
  .note-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .note-time{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);}
  .note-action{font-size:12px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;border:none;background:none;}
  .note-action:hover{color:var(--red);}
  .note-text{font-size:14px;line-height:1.5;word-break:break-word;}
  .todo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .todo-item.done{opacity:0.5;}
  .todo-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;cursor:pointer;}
  .todo-item.done .todo-check{background:var(--green);border-color:var(--green);}
  .todo-checkmark{display:none;color:#fff;font-size:13px;font-weight:700;}
  .todo-item.done .todo-checkmark{display:block;}
  .todo-text{flex:1;font-size:14px;cursor:pointer;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--text3);}
  .todo-del{color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border:none;background:none;}
  .todo-del:hover{color:var(--red);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
  .empty-icon{font-size:32px;margin-bottom:8px;}
  .section-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
  .sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.synced{background:var(--green);}
  .sync-dot.syncing{background:var(--yellow);animation:blink 0.8s infinite;}
  .sync-dot.error{background:var(--red);}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">‹ 4fin OS</a>
  <div class="logo">Poznámky</div>
  <div id="clock"></div>
</header>
<div class="shell">
  <div class="sync-bar">
    <div class="sync-dot syncing" id="sync-dot"></div>
    <span id="sync-status">Načítám data...</span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('notes')">📝 Poznámky</button>
    <button class="tab-btn" onclick="switchTab('todos')">✅ Úkoly</button>
  </div>

  <div id="tab-notes">
    <div class="quick-box">
      <div class="section-label">Nová poznámka</div>
      <textarea class="quick-input" id="note-input" placeholder="Napiš poznámku..." rows="3"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">
        <button class="add-btn" onclick="addNote()">+ Přidat</button>
        <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="note-priority" style="accent-color:var(--accent);"> Důležité
        </label>
      </div>
    </div>
    <div class="notes-list" id="notes-list">
      <div class="empty-state"><div class="empty-icon">⏳</div>Načítám...</div>
    </div>
  </div>

  <div id="tab-todos" style="display:none;">
    <div class="quick-box">
      <div class="section-label">Nový úkol</div>
      <input class="quick-input" id="todo-input" placeholder="Co je potřeba udělat?" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="add-btn" onclick="addTodo()" style="margin-top:10px;">+ Přidat úkol</button>
    </div>
    <div id="todos-list">
      <div class="empty-state"><div class="empty-icon">⏳</div>Načítám...</div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqnJsAlmzOAntypivM5oiLt8twpNJkJrUaK4D-rkvQPzFC_btwUrC8ivasYrnWbdsM6g/exec';

function pad(n){return String(n).padStart(2,'0');}
function updateClock(){
  const now=new Date();
  const el=document.getElementById('clock');
  if(el) el.textContent=pad(now.getHours())+':'+pad(now.getMinutes());
}
updateClock();setInterval(updateClock,30000);

let notes=[];
let todos=[];

function setSyncStatus(state,text){
  document.getElementById('sync-dot').className='sync-dot '+state;
  document.getElementById('sync-status').textContent=text;
}

async function loadData(){
  setSyncStatus('syncing','Načítám z Google Sheets...');
  try {
    const res = await fetch(SCRIPT_URL+'?action=load');
    const rows = await res.json();
    notes=[];todos=[];
    rows.forEach(r=>{
      if(r[2]==='note') notes.push({ts:r[0],text:r[1],priority:r[3]==='1'});
      else if(r[2]==='todo') todos.push({ts:r[0],text:r[1],done:r[4]==='1'});
    });
    setSyncStatus('synced','Synchronizováno ✓');
  } catch(e) {
    // fallback to localStorage
    notes=JSON.parse(localStorage.getItem('4fin_notes')||'[]');
    todos=JSON.parse(localStorage.getItem('4fin_todos')||'[]');
    setSyncStatus('error','Offline — data uložena lokálně');
  }
  renderNotes();renderTodos();
}

async function saveData(){
  setSyncStatus('syncing','Ukládám...');
  const rows=[];
  notes.forEach(n=>rows.push([n.ts,n.text,'note',n.priority?'1':'0','']));
  todos.forEach(t=>rows.push([t.ts,t.text,'todo','',t.done?'1':'0']));
  // save locally always
  localStorage.setItem('4fin_notes',JSON.stringify(notes));
  localStorage.setItem('4fin_todos',JSON.stringify(todos));
  try {
    await fetch(SCRIPT_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(rows)));
    setSyncStatus('synced','Uloženo ✓');
  } catch(e) {
    setSyncStatus('error','Offline — uloženo lokálně');
  }
}

function formatTime(ts){
  const d=new Date(Number(ts));
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

function renderNotes(){
  const list=document.getElementById('notes-list');
  if(!notes.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div>Žádné poznámky</div>';return;}
  list.innerHTML=[...notes].reverse().map((n,i)=>{
    const idx=notes.length-1-i;
    return `<div class="note-card${n.priority?' priority':''}">
      <div class="note-meta">
        <span class="note-time">${formatTime(n.ts)}${n.priority?' ⭐':''}</span>
        <button class="note-action" onclick="deleteNote(${idx})">✕ Smazat</button>
      </div>
      <div class="note-text">${String(n.text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
}

async function addNote(){
  const input=document.getElementById('note-input');
  const text=input.value.trim();
  if(!text)return;
  const priority=document.getElementById('note-priority').checked;
  notes.push({text,priority,ts:Date.now()});
  input.value='';
  document.getElementById('note-priority').checked=false;
  renderNotes();
  await saveData();
}

async function deleteNote(i){
  notes.splice(i,1);
  renderNotes();
  await saveData();
}

function renderTodos(){
  const list=document.getElementById('todos-list');
  if(!todos.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div>Žádné úkoly</div>';return;}
  const open=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);
  let html='';
  if(open.length){html+=`<div class="section-label">Čekající (${open.length})</div>`;todos.forEach((t,i)=>{if(!t.done)html+=todoHTML(t,i);});}
  if(done.length){html+=`<div class="section-label" style="margin-top:16px;">Hotovo (${done.length})</div>`;todos.forEach((t,i)=>{if(t.done)html+=todoHTML(t,i);});}
  list.innerHTML=html;
}

function todoHTML(t,i){
  return `<div class="todo-item${t.done?' done':''}">
    <div class="todo-check" onclick="toggleTodo(${i})"><span class="todo-checkmark">✓</span></div>
    <div class="todo-text" onclick="toggleTodo(${i})">${String(t.text).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
    <button class="todo-del" onclick="deleteTodo(${i})">✕</button>
  </div>`;
}

async function addTodo(){
  const input=document.getElementById('todo-input');
  const text=input.value.trim();
  if(!text)return;
  todos.push({text,done:false,ts:Date.now()});
  input.value='';
  renderTodos();
  await saveData();
}

async function toggleTodo(i){
  todos[i].done=!todos[i].done;
  renderTodos();
  await saveData();
}

async function deleteTodo(i){
  todos.splice(i,1);
  renderTodos();
  await saveData();
}

function switchTab(tab){
  document.getElementById('tab-notes').style.display=tab==='notes'?'':'none';
  document.getElementById('tab-todos').style.display=tab==='todos'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&tab==='notes')||(i===1&&tab==='todos'));
  });
}

loadData();
</script>
</body>
</html>

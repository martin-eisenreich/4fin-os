<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>4fin | Archiv zápisů</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#252a3a;--accent:#c8a96e;--green:#4caf82;--red:#e05252;--yellow:#e0a832;--blue:#5b8dee;--text:#e8eaf0;--text2:#8892a4;--text3:#555f72;--radius:10px;--mono:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;padding-bottom:60px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:0.08em;}
  .logo span{color:var(--text3);}
  .back-btn{font-size:13px;color:var(--text2);text-decoration:none;font-family:var(--mono);}
  .back-btn:hover{color:var(--accent);}
  #clock{font-family:var(--mono);font-size:12px;color:var(--text3);}
  .shell{max-width:860px;margin:0 auto;padding:28px 20px 80px;}

  .sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:20px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .sync-dot.synced{background:var(--green);}
  .sync-dot.syncing{background:var(--yellow);animation:blink 0.8s infinite;}
  .sync-dot.error{background:var(--red);}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .page-title{font-size:22px;font-weight:700;margin-bottom:4px;}
  .page-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .stat-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--accent);}
  .stat-label{font-size:11px;color:var(--text3);margin-top:3px;}

  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filter-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;}
  .filter-btn.active{background:var(--accent);color:#0d0f14;border-color:var(--accent);}
  .filter-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 12px;outline:none;flex:1;min-width:160px;}
  .filter-input:focus{border-color:var(--accent);}
  select.filter-input{cursor:pointer;}

  .month-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
  .month-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .zapis-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
  .zapis-card:hover{border-color:rgba(200,169,110,0.4);}
  .zapis-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;}
  .zapis-icon{font-size:18px;flex-shrink:0;}
  .zapis-info{flex:1;min-width:0;}
  .zapis-name{font-size:14px;font-weight:700;}
  .zapis-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
  .zapis-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}
  .badge-sys{background:rgba(91,141,238,0.15);color:var(--blue);}
  .badge-rozv{background:rgba(76,175,130,0.15);color:var(--green);}
  .badge-sent{background:rgba(76,175,130,0.1);color:var(--green);}
  .badge-nosent{background:rgba(85,95,114,0.1);color:var(--text3);}
  .zapis-chev{color:var(--text3);font-size:16px;transition:transform 0.2s;flex-shrink:0;}
  .zapis-chev.open{transform:rotate(180deg);}

  .zapis-body{display:none;border-top:1px solid var(--border);padding:16px 18px;}
  .zapis-body.open{display:block;}

  /* SEKCE DAT */
  .data-section{margin-bottom:16px;}
  .data-section-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
  .data-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .data-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .data-item{background:var(--surface2);border-radius:6px;padding:8px 10px;}
  .data-item-label{font-size:10px;color:var(--text3);margin-bottom:2px;}
  .data-item-val{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text);}
  .data-item-val.green{color:var(--green);}
  .data-item-val.red{color:var(--red);}

  .zapis-notes-box{background:var(--surface2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;white-space:pre-wrap;}
  .zapis-id{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:6px;}

  .empty{text-align:center;padding:48px 20px;color:var(--text3);}
  .empty-icon{font-size:40px;margin-bottom:12px;}

  @media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr;}.data-grid{grid-template-columns:1fr 1fr;}.data-grid-6{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">← 4fin OS</a>
  <div class="logo">4fin <span>//</span> Archiv zápisů</div>
  <div id="clock"></div>
</header>

<div class="shell">
  <div class="sync-bar"><div class="sync-dot syncing" id="syncDot"></div><span id="syncText">Načítám...</span></div>

  <div class="page-title">Archiv zápisů</div>
  <div class="page-sub">Historie všech konzultací a zápisů</div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Celkem zápisů</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-month">—</div><div class="stat-label">Tento měsíc</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-sys">—</div><div class="stat-label">Systémové</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-rozv">—</div><div class="stat-label">Rozvojové</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('vse',this)">Vše</button>
    <button class="filter-btn" onclick="setFilter('sys',this)">Systémové</button>
    <button class="filter-btn" onclick="setFilter('rozv',this)">Rozvojové</button>
    <select class="filter-input" id="monthFilter" onchange="renderZapisy()" style="max-width:180px;">
      <option value="">Všechny měsíce</option>
    </select>
    <input class="filter-input" id="searchInput" placeholder="Hledat osobu nebo text..." oninput="renderZapisy()">
  </div>

  <div id="zapisyList"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqnJsAlmzOAntypivM5oiLt8twpNJkJrUaK4D-rkvQPzFC_btwUrC8ivasYrnWbdsM6g/exec';
let allZapisy = [];
let currentFilter = 'vse';

// Mapování sloupců z listu Konzultace:
// 0=Datum, 1=PersonID(jmeno), 2=Role, 3=Typ,
// 4=OB1, 5=OB2, 6=OB3, 7=OB4, 8=OB5, 9=OBmesic(6),
// 10=Pay1, 11=Pay2, 12=Pay3, 13=Pay4, 14=Pay5, 15=Pay6,
// 16=ZB, 17=OB6m_total,
// 18=Makleri_cnt, 19=Tipari_cnt,
// 20=Schuzy, 21=Pohovory, 22=Analyzy, 23=Makleri_volani, 24=Doporuceni,
// 25=IK, 26=Diar, 27=Podcast(?), 28=Notes, 29=Timestamp, 30=zdroj

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return String(d);
    return dt.toLocaleDateString('cs-CZ', {day:'numeric', month:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'});
  } catch(e) { return String(d); }
}

function fmtNum(v) {
  const n = +v;
  if (!n || isNaN(n)) return '—';
  return n.toLocaleString('cs-CZ');
}

function isNum(v) { return v !== '' && v !== null && v !== undefined && !isNaN(+v) && +v !== 0; }

async function loadAll() {
  setSyncStatus('syncing', 'Načítám záznamy...');
  allZapisy = [];
  try {
    // Načti z listu Konzultace (kompletní data)
    const r1 = await fetch(SCRIPT_URL + '?action=get_konzultace');
    const rows1 = await r1.json();
    if (rows1 && rows1.length > 1) {
      rows1.slice(1).forEach((r, idx) => {
        if (!r[0] || !r[1]) return; // přeskoč prázdné řádky
        // Detekce sloupců - pokud jsou hlavičky v řádku 1, přeskočeny
        const source = r[30] || r[24] || '';
        if (source === 'konzultace' || !source) {
          allZapisy.push({
            id: 'K-' + idx + '-' + String(r[0]).substring(0,10),
            date: r[0],
            name: r[1],
            role: r[2] || '',
            type: (r[3] === 'sys' || r[3] === 'systemova') ? 'sys' : (r[3] === 'rozv' || r[3] === 'rozvojova') ? 'rozv' : r[3] || 'sys',
            ob: [r[4], r[5], r[6], r[7], r[8], r[9]],
            pay: [r[10], r[11], r[12], r[13], r[14], r[15]],
            zb: r[16],
            ob6total: r[17],
            makleri_cnt: r[18],
            tipari_cnt: r[19],
            schuzy: r[20],
            pohovory: r[21],
            analyzy: r[22],
            makleri_vol: r[23],
            doporuceni: r[24],
            ik: r[25],
            diar: r[26],
            notes: r[27] || r[28] || '',
            timestamp: r[28] || r[29] || r[0],
            source: 'konzultace',
            emailStatus: ''
          });
        }
      });
    }

    // Načti z listu Zapisy (emailové logy) a přidej email status
    const r2 = await fetch(SCRIPT_URL + '?action=get_zapisy');
    const rows2 = await r2.json();
    if (rows2 && rows2.length > 1) {
      rows2.slice(1).forEach(r => {
        if (!r[0]) return;
        // Zkontroluj jestli není duplicita
        const dateStr = String(r[1]).substring(0, 10);
        const existing = allZapisy.find(z =>
          String(z.name).toLowerCase().includes(String(r[2]).toLowerCase().split(',')[0].toLowerCase().trim()) &&
          String(z.date).substring(0, 10) === dateStr
        );
        if (existing) {
          existing.emailStatus = r[7] || '';
          existing.emailId = r[0];
        } else if (r[0].startsWith('Z-') || r[0].startsWith('PREHLED-')) {
          // Přidej jako samostatný záznam pouze pokud není v konzultacích
          allZapisy.push({
            id: r[0], date: r[1], name: r[2], role: '',
            type: r[4] === 'Rozvojová' ? 'rozv' : 'sys',
            ob: [], pay: [], notes: r[5] || '', emailStatus: r[7] || '',
            source: 'zapis', timestamp: r[1]
          });
        }
      });
    }

    // Seřaď od nejnovějšího
    allZapisy.sort((a, b) => new Date(b.timestamp || b.date) - new Date(a.timestamp || a.date));

    // Odstraň duplicity (stejná osoba, stejný den, typ konzultace)
    const seen = new Set();
    allZapisy = allZapisy.filter(z => {
      const key = String(z.name).substring(0,10) + String(z.date).substring(0,10) + (z.type||'');
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    // Naplň filtr měsíců
    const months = {};
    allZapisy.forEach(z => {
      try {
        const d = new Date(z.date);
        if (!isNaN(d)) {
          const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
          const label = d.toLocaleDateString('cs-CZ', {month:'long', year:'numeric'});
          months[key] = label;
        }
      } catch(e) {}
    });
    const mSel = document.getElementById('monthFilter');
    Object.entries(months).sort((a,b) => b[0].localeCompare(a[0])).forEach(([k,v]) => {
      const o = document.createElement('option');
      o.value = k; o.textContent = v;
      mSel.appendChild(o);
    });

    setSyncStatus('synced', 'Načteno · ' + allZapisy.length + ' zápisů');
  } catch(e) {
    setSyncStatus('error', 'Chyba načítání: ' + e.message);
  }
  updateStats();
  renderZapisy();
}

function updateStats() {
  const now = new Date();
  const thisMonth = allZapisy.filter(z => {
    try { const d = new Date(z.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); } catch(e) { return false; }
  });
  document.getElementById('stat-total').textContent = allZapisy.length;
  document.getElementById('stat-month').textContent = thisMonth.length;
  document.getElementById('stat-sys').textContent = allZapisy.filter(z => z.type === 'sys' || z.type === 'systemova' || z.type === 'Systémová').length;
  document.getElementById('stat-rozv').textContent = allZapisy.filter(z => z.type === 'rozv' || z.type === 'rozvojova' || z.type === 'Rozvojová').length;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderZapisy();
}

function renderZapisy() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const monthFilter = document.getElementById('monthFilter').value;
  let filtered = allZapisy;

  if (currentFilter === 'sys') filtered = filtered.filter(z => z.type === 'sys' || z.type === 'systemova' || z.type === 'Systémová');
  if (currentFilter === 'rozv') filtered = filtered.filter(z => z.type === 'rozv' || z.type === 'Rozvojová');
  if (monthFilter) {
    filtered = filtered.filter(z => {
      try { const d = new Date(z.date); return (d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0')) === monthFilter; } catch(e) { return false; }
    });
  }
  if (search) filtered = filtered.filter(z =>
    (z.name||'').toLowerCase().includes(search) ||
    (z.notes||'').toLowerCase().includes(search) ||
    (z.role||'').toLowerCase().includes(search)
  );

  const list = document.getElementById('zapisyList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div>Žádné záznamy nenalezeny.</div></div>';
    return;
  }

  // Seskup po měsících
  const byMonth = {};
  filtered.forEach(z => {
    try {
      const d = new Date(z.date);
      const key = isNaN(d) ? 'Neznámé datum' : d.toLocaleDateString('cs-CZ', {month:'long', year:'numeric'});
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(z);
    } catch(e) {
      if (!byMonth['Neznámé datum']) byMonth['Neznámé datum'] = [];
      byMonth['Neznámé datum'].push(z);
    }
  });

  let html = '';
  Object.entries(byMonth).forEach(([month, zapisy]) => {
    html += `<div class="month-label">${month} <span style="color:var(--text3);font-size:10px;">(${zapisy.length})</span></div>`;
    zapisy.forEach((z, i) => {
      const isRozv = z.type === 'rozv' || z.type === 'Rozvojová';
      const emailSent = z.emailStatus && z.emailStatus.includes('Odeslano');
      const typeLabel = isRozv ? 'Rozvojová' : 'Systémová';
      const uid = 'z-' + month.replace(/\s/g,'-') + '-' + i;

      // OB data
      const obVals = (z.ob || []).filter((v,i) => isNum(v));
      const hasOB = obVals.length > 0;
      const obLabels = ['OB M1','OB M2','OB M3','OB M4','OB M5','OB M6'];

      // Pay data
      const payVals = (z.pay || []);
      const hasPay = payVals.some(v => isNum(v));
      const payLabels = ['Pay M1','Pay M2','Pay M3','Pay M4','Pay M5','Pay M6'];

      // Aktivita
      const hasActivity = isNum(z.schuzy) || isNum(z.analyzy) || isNum(z.makleri_vol);

      html += `<div class="zapis-card">
        <div class="zapis-header" onclick="toggleZ('${uid}')">
          <div class="zapis-icon">${isRozv ? '🌱' : '📊'}</div>
          <div class="zapis-info">
            <div class="zapis-name">${esc(z.name || '—')}</div>
            <div class="zapis-meta">${fmtDate(z.date)}${z.role ? ' · ' + esc(z.role) : ''}</div>
            <div class="zapis-badges">
              <span class="badge ${isRozv ? 'badge-rozv' : 'badge-sys'}">${typeLabel}</span>
              <span class="badge ${emailSent ? 'badge-sent' : 'badge-nosent'}">${emailSent ? '📧 Odesláno' : '📭 Neodesláno'}</span>
              ${hasOB ? `<span class="badge badge-sys" style="background:rgba(200,169,110,0.1);color:var(--accent);">OB: ${fmtNum(z.ob[5] || z.ob[2] || z.ob[0])}</span>` : ''}
            </div>
          </div>
          <div class="zapis-chev" id="chev-${uid}">▾</div>
        </div>
        <div class="zapis-body" id="${uid}">
          ${z.notes && String(z.notes).trim() && String(z.notes).trim() !== '0' ? `
          <div class="data-section">
            <div class="data-section-title">Zápis z konzultace</div>
            <div class="zapis-notes-box">${esc(z.notes)}</div>
          </div>` : ''}

          ${hasOB ? `
          <div class="data-section">
            <div class="data-section-title">Obchodní body (OB) — po měsících</div>
            <div class="data-grid-6">
              ${(z.ob||[]).map((v,i) => `<div class="data-item"><div class="data-item-label">${obLabels[i]||'OB'}</div><div class="data-item-val ${isNum(v)?'':''}">${fmtNum(v)}</div></div>`).join('')}
            </div>
            ${isNum(z.ob6total) ? `<div style="margin-top:8px;font-size:12px;color:var(--text3);">Celkem OB 6M: <strong style="color:var(--accent);">${fmtNum(z.ob6total)}</strong></div>` : ''}
          </div>` : ''}

          ${hasPay ? `
          <div class="data-section">
            <div class="data-section-title">Výplata — po měsících</div>
            <div class="data-grid-6">
              ${(z.pay||[]).map((v,i) => `<div class="data-item"><div class="data-item-label">${payLabels[i]||'Pay'}</div><div class="data-item-val">${fmtNum(v)}</div></div>`).join('')}
            </div>
          </div>` : ''}

          ${isNum(z.zb) || isNum(z.makleri_cnt) || isNum(z.tipari_cnt) ? `
          <div class="data-section">
            <div class="data-section-title">Produkce — ostatní</div>
            <div class="data-grid">
              ${isNum(z.zb) ? `<div class="data-item"><div class="data-item-label">ZB tento měsíc</div><div class="data-item-val">${fmtNum(z.zb)}</div></div>` : ''}
              ${isNum(z.makleri_cnt) ? `<div class="data-item"><div class="data-item-label">Zasml. makléři</div><div class="data-item-val">${fmtNum(z.makleri_cnt)}</div></div>` : ''}
              ${isNum(z.tipari_cnt) ? `<div class="data-item"><div class="data-item-label">Zasml. tipari</div><div class="data-item-val">${fmtNum(z.tipari_cnt)}</div></div>` : ''}
            </div>
          </div>` : ''}

          ${hasActivity ? `
          <div class="data-section">
            <div class="data-section-title">Aktivita</div>
            <div class="data-grid">
              ${isNum(z.schuzy) ? `<div class="data-item"><div class="data-item-label">Nové schůzky</div><div class="data-item-val">${fmtNum(z.schuzy)}</div></div>` : ''}
              ${isNum(z.pohovory) ? `<div class="data-item"><div class="data-item-label">Pohovory</div><div class="data-item-val">${fmtNum(z.pohovory)}</div></div>` : ''}
              ${isNum(z.analyzy) ? `<div class="data-item"><div class="data-item-label">Analýzy</div><div class="data-item-val">${fmtNum(z.analyzy)}</div></div>` : ''}
              ${isNum(z.makleri_vol) ? `<div class="data-item"><div class="data-item-label">Volání makléřům</div><div class="data-item-val">${fmtNum(z.makleri_vol)}</div></div>` : ''}
              ${isNum(z.doporuceni) ? `<div class="data-item"><div class="data-item-label">Doporučení</div><div class="data-item-val">${fmtNum(z.doporuceni)}</div></div>` : ''}
            </div>
          </div>` : ''}

          ${z.ik || z.diar ? `
          <div class="data-section">
            <div class="data-section-title">Kontroly</div>
            <div class="data-grid">
              <div class="data-item"><div class="data-item-label">IK karta</div><div class="data-item-val ${z.ik==='✅'?'green':'red'}">${z.ik||'—'}</div></div>
              <div class="data-item"><div class="data-item-label">Diář</div><div class="data-item-val ${z.diar==='✅'?'green':'red'}">${z.diar||'—'}</div></div>
            </div>
          </div>` : ''}

          ${z.emailStatus ? `<div style="font-size:11px;color:var(--text3);margin-top:6px;">📧 ${esc(z.emailStatus)}</div>` : ''}
          <div class="zapis-id">ID: ${esc(z.id||z.emailId||'—')}</div>
        </div>
      </div>`;
    });
  });

  list.innerHTML = html;
}

function toggleZ(uid) {
  const body = document.getElementById(uid);
  const chev = document.getElementById('chev-' + uid);
  if (body) { body.classList.toggle('open'); }
  if (chev) { chev.classList.toggle('open'); }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

document.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 30000);
  loadAll();
});
</script>
</body>
</html>

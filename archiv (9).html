<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>4fin | Archiv zápisů</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#252a3a;--accent:#c8a96e;--green:#4caf82;--red:#e05252;--yellow:#e0a832;--blue:#5b8dee;--text:#e8eaf0;--text2:#8892a4;--text3:#555f72;--radius:10px;--mono:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;padding-bottom:60px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:0.08em;}.logo span{color:var(--text3);}
  .back-btn{font-size:13px;color:var(--text2);text-decoration:none;font-family:var(--mono);}.back-btn:hover{color:var(--accent);}
  #clock{font-family:var(--mono);font-size:12px;color:var(--text3);}
  .shell{max-width:860px;margin:0 auto;padding:28px 20px 80px;}
  .sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:20px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .sync-dot.synced{background:var(--green);}.sync-dot.syncing{background:var(--yellow);animation:blink 0.8s infinite;}.sync-dot.error{background:var(--red);}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .page-title{font-size:22px;font-weight:700;margin-bottom:4px;}
  .page-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .stat-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--accent);}
  .stat-label{font-size:11px;color:var(--text3);margin-top:3px;}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filter-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;}
  .filter-btn.active{background:var(--accent);color:#0d0f14;border-color:var(--accent);}
  .filter-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 12px;outline:none;flex:1;min-width:160px;}
  .filter-input:focus{border-color:var(--accent);}
  .week-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
  .week-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .zapis-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
  .zapis-card:hover{border-color:rgba(200,169,110,0.4);}
  .zapis-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;}
  .zapis-icon{font-size:18px;flex-shrink:0;}
  .zapis-info{flex:1;min-width:0;}
  .zapis-name{font-size:14px;font-weight:700;}
  .zapis-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
  .zapis-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}
  .badge-sys{background:rgba(91,141,238,0.15);color:var(--blue);}
  .badge-rozv{background:rgba(76,175,130,0.15);color:var(--green);}
  .badge-sent{background:rgba(76,175,130,0.1);color:var(--green);}
  .badge-nosent{background:rgba(85,95,114,0.1);color:var(--text3);}
  .badge-ob{background:rgba(200,169,110,0.1);color:var(--accent);}
  .zapis-chev{color:var(--text3);font-size:16px;transition:transform 0.2s;flex-shrink:0;}
  .zapis-chev.open{transform:rotate(180deg);}
  .zapis-body{display:none;border-top:1px solid var(--border);padding:16px 18px;}
  .zapis-body.open{display:block;}
  .data-section{margin-bottom:16px;}
  .data-section-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
  .data-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .data-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .data-item{background:var(--surface2);border-radius:6px;padding:8px 10px;}
  .data-item-label{font-size:10px;color:var(--text3);margin-bottom:2px;}
  .data-item-val{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text);}
  .data-item-val.green{color:var(--green);}.data-item-val.red{color:var(--red);}
  .zapis-notes-box{background:var(--surface2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;white-space:pre-wrap;}
  .zapis-id{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:6px;}
  .empty{text-align:center;padding:48px 20px;color:var(--text3);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  @media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr;}.data-grid{grid-template-columns:1fr 1fr;}.data-grid-6{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">← 4fin OS</a>
  <div class="logo">4fin <span>//</span> Archiv zápisů</div>
  <div id="clock"></div>
</header>
<div class="shell">
  <div class="sync-bar"><div class="sync-dot syncing" id="syncDot"></div><span id="syncText">Načítám...</span></div>
  <div class="page-title">Archiv zápisů</div>
  <div class="page-sub">Historie všech konzultací — seskupeno po týdnech</div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Celkem zápisů</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-month">—</div><div class="stat-label">Tento měsíc</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-sys">—</div><div class="stat-label">Systémové</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-rozv">—</div><div class="stat-label">Rozvojové</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('vse',this)">Vše</button>
    <button class="filter-btn" onclick="setFilter('sys',this)">Systémové</button>
    <button class="filter-btn" onclick="setFilter('rozv',this)">Rozvojové</button>
    <select class="filter-input" id="monthFilter" onchange="renderZapisy()" style="max-width:200px;"><option value="">Všechny měsíce</option></select>
    <input class="filter-input" id="searchInput" placeholder="Hledat osobu nebo text..." oninput="renderZapisy()">
  </div>
  <div id="zapisyList"></div>
</div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyqnJsAlmzOAntypivM5oiLt8twpNJkJrUaK4D-rkvQPzFC_btwUrC8ivasYrnWbdsM6g/exec';
let allZapisy=[];
let currentFilter='vse';

function setSS(s,t){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncText').textContent=t;}
function fmtDate(d){try{const dt=parseDate(d);if(isNaN(dt))return String(d||'—');return dt.toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return String(d||'—');}}
function fmtNum(v){const n=+v;if(!n||isNaN(n))return'—';return n.toLocaleString('cs-CZ');}
function isNum(v){return v!==''&&v!==null&&v!==undefined&&!isNaN(+v)&&+v!==0;}
function norm(n){return String(n||'').toLowerCase().replace(/[,\.\s]+/g,'').trim().substring(0,8);}
function parseDate(d){
  if(!d)return new Date(NaN);
  const s=String(d);
  // Pokud je to jen datum (YYYY-MM-DD), parsuj jako lokální čas (ne UTC)
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
    const[y,m,dd]=s.split('-');return new Date(+y,+m-1,+dd);
  }
  return new Date(d);
}
function dateKey(d){try{const dt=parseDate(d);if(isNaN(dt))return'';return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}catch(e){return'';}}
function weekInfo(d){
  try{
    const dt=parseDate(d);if(isNaN(dt))return{key:'x',label:'Neznámý týden'};
    const day=dt.getDay()||7;
    const mon=new Date(dt);mon.setDate(dt.getDate()-day+1);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const f=x=>x.toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric'});
    return{key:mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0'),label:`Týden ${f(mon)} – ${f(sun)}`};
  }catch(e){return{key:'x',label:'Neznámý týden'};}
}

async function loadAll(){
  setSS('syncing','Načítám...');
  allZapisy=[];
  try{
    // Krok 1: Načti Zapisy (emailové logy) - primární zdroj
    const r2=await fetch(SCRIPT_URL+'?action=get_zapisy');
    const rows2=await r2.json();
    const zapisMap={};// key: norm(name)_dateKey -> záznam

    if(rows2&&rows2.length>1){
      rows2.slice(1).forEach(r=>{
        if(!r[0]||!r[2])return;
        const isPrehled=r[0].startsWith('PREHLED-');
        const typ=isPrehled?'prehled':((r[4]==='Rozvojová'||r[4]==='rozv')?'rozv':'sys');
        const dk=dateKey(r[1]);
        const nk=norm(r[2]);
        const mk=nk+'_'+dk+'_'+typ;
        if(zapisMap[mk])return;
        const rec={
          id:r[0],date:r[1]||dk,timestamp:r[1],
          name:r[2],role:'',
          type:typ,isPrehled:isPrehled,
          notes:r[5]||'',
          emailStatus:r[7]||'',
          ob:[],pay:[],
          source:'zapis'
        };
        zapisMap[mk]=rec;
        allZapisy.push(rec);
      });
    }

    // Krok 2: Načti Konzultace - doplň OB/výplata/aktivita do existujících zápisů
    const r1=await fetch(SCRIPT_URL+'?action=get_konzultace');
    const rows1=await r1.json();

    if(rows1&&rows1.length>1){
      rows1.slice(1).forEach(r=>{
        if(!r[0]||!r[1])return;
        const dk=dateKey(r[0]);
        const nk=norm(r[1]);
        const typ=(r[3]==='sys'||r[3]==='systemova')?'sys':'rozv';
        const mk=nk+'_'+dk+'_'+typ;

        // Pokud existuje odpovídající zápis ze Zapisy, doplň mu data
        if(zapisMap[mk]){
          const rec=zapisMap[mk];
          rec.role=rec.role||r[2]||'';
          rec.ob=[r[4],r[5],r[6],r[7],r[8],r[9]];
          rec.pay=[r[10],r[11],r[12],r[13],r[14],r[15]];
          rec.zb=r[16];rec.ob6total=r[17];
          rec.makleri_cnt=r[18];rec.tipari_cnt=r[19];
          rec.schuzy=r[20];rec.pohovory=r[21];rec.analyzy=r[22];
          rec.makleri_vol=r[23];rec.doporuceni=r[24];
          rec.ik=r[25];rec.diar=r[26];
          if(!rec.notes&&r[27])rec.notes=r[27];
          rec.source='both';
        }
        // Konzultace bez emailového záznamu se nezobrazuje - archiv zobrazuje jen odeslané zápisy
      });
    }

    // Seřaď od nejnovějšího
    allZapisy.sort((a,b)=>new Date(b.timestamp||b.date)-new Date(a.timestamp||a.date));

    // Filtr měsíců
    const months={};
    allZapisy.forEach(z=>{
      try{const d=parseDate(z.date);if(!isNaN(d)){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');months[k]=d.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});}}catch(e){}
    });
    const mSel=document.getElementById('monthFilter');
    Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([k,v])=>{
      const o=document.createElement('option');o.value=k;o.textContent=v;mSel.appendChild(o);
    });

    setSS('synced','Načteno · '+allZapisy.length+' zápisů');
  }catch(e){setSS('error','Chyba: '+e.message);console.error(e);}
  updateStats();renderZapisy();
}

function updateStats(){
  const now=new Date();
  const tm=allZapisy.filter(z=>{try{const d=parseDate(z.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}catch(e){return false;}});
  document.getElementById('stat-total').textContent=allZapisy.length;
  document.getElementById('stat-month').textContent=tm.length;
  document.getElementById('stat-sys').textContent=allZapisy.filter(z=>z.type==='sys').length;
  document.getElementById('stat-rozv').textContent=allZapisy.filter(z=>z.type==='rozv').length;
}

function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderZapisy();}

function renderZapisy(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const mf=document.getElementById('monthFilter').value;
  let f=allZapisy;
  if(currentFilter==='sys')f=f.filter(z=>z.type==='sys');
  if(currentFilter==='rozv')f=f.filter(z=>z.type==='rozv');
  if(mf)f=f.filter(z=>{try{const d=parseDate(z.date);return(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'))===mf;}catch(e){return false;}});
  if(search)f=f.filter(z=>(z.name||'').toLowerCase().includes(search)||(z.notes||'').toLowerCase().includes(search));

  const list=document.getElementById('zapisyList');
  if(!f.length){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div>Žádné záznamy.</div></div>';return;}

  const byWeek={};const wOrder=[];
  f.forEach(z=>{const{key,label}=weekInfo(z.date);if(!byWeek[key]){byWeek[key]={label,zapisy:[]};wOrder.push(key);}byWeek[key].zapisy.push(z);});

  let html='';
  wOrder.forEach(wk=>{
    const{label,zapisy}=byWeek[wk];
    html+=`<div class="week-label">${label} <span style="color:var(--text3);font-size:10px;">(${zapisy.length})</span></div>`;
    zapisy.forEach((z,i)=>{
      const isRozv=z.type==='rozv';
      const isPrehled=z.isPrehled||z.type==='prehled';
      const emailSent=z.emailStatus&&z.emailStatus.includes('Odeslano');
      const uid='z'+wk.replace(/-/g,'')+i;
      const hasOB=(z.ob||[]).some(v=>isNum(v));
      const hasPay=(z.pay||[]).some(v=>isNum(v));
      const hasAct=isNum(z.schuzy)||isNum(z.analyzy)||isNum(z.makleri_vol)||isNum(z.pohovory);
      const obLast=z.ob&&[...z.ob].reverse().find(v=>isNum(v));
      const icon=isPrehled?'📋':(isRozv?'🌱':'📊');
      const typeLabel=isPrehled?'Přehled úkolů':(isRozv?'Rozvojová':'Systémová');
      const badgeClass=isPrehled?'badge-nosent':(isRozv?'badge-rozv':'badge-sys');

      html+=`<div class="zapis-card">
        <div class="zapis-header" onclick="toggleZ('${uid}')">
          <div class="zapis-icon">${icon}</div>
          <div class="zapis-info">
            <div class="zapis-name">${esc(z.name||'—')}${z.role?` <span style="font-weight:400;color:var(--text3);font-size:12px;">· ${esc(z.role)}</span>`:''}
            </div>
            <div class="zapis-meta">${fmtDate(z.date)}</div>
            <div class="zapis-badges">
              <span class="badge ${badgeClass}">${typeLabel}</span>
              <span class="badge ${emailSent?'badge-sent':'badge-nosent'}">${emailSent?'📧 Odesláno':'📭 Neodesláno'}</span>
              ${!isPrehled&&isNum(obLast)?`<span class="badge badge-ob">OB: ${fmtNum(obLast)}</span>`:''}
            </div>
          </div>
          <div class="zapis-chev" id="chev-${uid}">▾</div>
        </div>
        <div class="zapis-body" id="${uid}">
          ${z.notes&&String(z.notes).trim()&&String(z.notes).trim()!=='0'?`
          <div class="data-section">
            <div class="data-section-title">Zápis z konzultace</div>
            <div class="zapis-notes-box">${esc(z.notes)}</div>
          </div>`:''}
          ${hasOB?`
          <div class="data-section">
            <div class="data-section-title">Obchodní body (OB) — M1 až M6</div>
            <div class="data-grid-6">${(z.ob||[]).map((v,i)=>`<div class="data-item"><div class="data-item-label">M${i+1}</div><div class="data-item-val">${fmtNum(v)}</div></div>`).join('')}</div>
            ${isNum(z.ob6total)?`<div style="margin-top:6px;font-size:12px;color:var(--text3);">Celkem OB 6M: <strong style="color:var(--accent);">${fmtNum(z.ob6total)}</strong></div>`:''}
          </div>`:''}
          ${hasPay?`
          <div class="data-section">
            <div class="data-section-title">Výplata — M1 až M6</div>
            <div class="data-grid-6">${(z.pay||[]).map((v,i)=>`<div class="data-item"><div class="data-item-label">M${i+1}</div><div class="data-item-val">${fmtNum(v)}</div></div>`).join('')}</div>
          </div>`:''}
          ${isNum(z.zb)||isNum(z.makleri_cnt)||isNum(z.tipari_cnt)?`
          <div class="data-section">
            <div class="data-section-title">Produkce — ostatní</div>
            <div class="data-grid">
              ${isNum(z.zb)?`<div class="data-item"><div class="data-item-label">ZB měsíc</div><div class="data-item-val">${fmtNum(z.zb)}</div></div>`:''}
              ${isNum(z.makleri_cnt)?`<div class="data-item"><div class="data-item-label">Zasml. makléři</div><div class="data-item-val">${fmtNum(z.makleri_cnt)}</div></div>`:''}
              ${isNum(z.tipari_cnt)?`<div class="data-item"><div class="data-item-label">Zasml. tipari</div><div class="data-item-val">${fmtNum(z.tipari_cnt)}</div></div>`:''}
            </div>
          </div>`:''}
          ${hasAct?`
          <div class="data-section">
            <div class="data-section-title">Aktivita</div>
            <div class="data-grid">
              ${isNum(z.schuzy)?`<div class="data-item"><div class="data-item-label">Schůzky</div><div class="data-item-val">${fmtNum(z.schuzy)}</div></div>`:''}
              ${isNum(z.pohovory)?`<div class="data-item"><div class="data-item-label">Pohovory</div><div class="data-item-val">${fmtNum(z.pohovory)}</div></div>`:''}
              ${isNum(z.analyzy)?`<div class="data-item"><div class="data-item-label">Analýzy</div><div class="data-item-val">${fmtNum(z.analyzy)}</div></div>`:''}
              ${isNum(z.makleri_vol)?`<div class="data-item"><div class="data-item-label">Volání makl.</div><div class="data-item-val">${fmtNum(z.makleri_vol)}</div></div>`:''}
              ${isNum(z.doporuceni)?`<div class="data-item"><div class="data-item-label">Doporučení</div><div class="data-item-val">${fmtNum(z.doporuceni)}</div></div>`:''}
            </div>
          </div>`:''}
          ${z.ik||z.diar?`
          <div class="data-section">
            <div class="data-section-title">Kontroly</div>
            <div class="data-grid">
              ${z.ik?`<div class="data-item"><div class="data-item-label">IK karta</div><div class="data-item-val ${z.ik==='✅'?'green':'red'}">${z.ik}</div></div>`:''}
              ${z.diar?`<div class="data-item"><div class="data-item-label">Diář</div><div class="data-item-val ${z.diar==='✅'?'green':'red'}">${z.diar}</div></div>`:''}
            </div>
          </div>`:''}
          ${emailSent?`<div style="font-size:11px;color:var(--text3);margin-top:4px;">📧 ${esc(z.emailStatus)}</div>`:''}
          <div class="zapis-id">ID: ${esc(z.id)}</div>
        </div>
      </div>`;
    });
  });
  list.innerHTML=html;
}

function toggleZ(uid){const b=document.getElementById(uid);const c=document.getElementById('chev-'+uid);if(b)b.classList.toggle('open');if(c)c.classList.toggle('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function updateClock(){const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
document.addEventListener('DOMContentLoaded',()=>{updateClock();setInterval(updateClock,30000);loadAll();});
</script>
</body>
</html>
